server:
  port: 75

spring:
  profiles:
    default: dev
  main:
    web-application-type: reactive
  application:
    name: gateway
  thymeleaf:
    cache: true
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/user/**

        - id: file-system
          uri: lb://file-system
          predicates:
            - Path=/api/v1/fs/**

        - id: storage-service
          uri: lb://storage-service
          predicates:
            - Path=/api/v1/storage/**

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

jwt:
  secret: ${JWT_SECRET:}

logging:
  level:
    root: INFO
