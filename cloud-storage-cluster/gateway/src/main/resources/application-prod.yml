spring:
  cloud:
    nacos:
      discovery:
        service: ${spring.application.name}
        server-addr: nacos:8848
      config:
        server-addr: nacos:8848
        file-extension: yaml
        group: DEFAULT_GROUP
        import-check:
          enabled: false
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 1