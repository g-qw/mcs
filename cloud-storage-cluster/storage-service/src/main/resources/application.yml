server:
  port: 8102

spring:
  application:
    name: storage-service
  main:
    web-application-type: reactive
  profiles:
    default: dev

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    display-request-duration: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: info
    # root: OFF