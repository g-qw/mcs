spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/cloud_storage_cluster
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  cloud:
    nacos:
      discovery:
        service: ${spring.application.name}
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml
        group: DEFAULT_GROUP
        import-check:
          enabled: false
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 2
  codec:
    max-in-memory-size: 32MB

dubbo:
  application:
    name: ${spring.application.name}-dubbo
    qos-enable: false
  registry:
    address: nacos://${spring.cloud.nacos.discovery.server-addr}
    register-mode: instance
  consumer:
    timeout: 3000
    check: false
  protocol:
    name: dubbo
    port: -1

minio:
  access-key: ${MINIO_ACCESS_KEY:}
  secret-key: ${MINIO_SECRET_KEY:}

transfer:
  multi-file-config:
    memory-threshold: 5242880
    stream-threshold: 104857600
    file-timeout-minutes: 5
    batch-timeout-minutes: 10
    stream-prefetch: 4
    overflow-strategy: "DROP_OLDEST"
  chunked-upload-config:
    max-chunk-size-bytes: 104857600
    chunk-timeout-minutes: 1
  download-config:
    stream-buffer-size-bytes: 16384
    max-chunk-size-bytes: 5120
    max-zip-batch-size-bytes: 1073741824
    zip-packaging-timeout-minutes: 10


gateway:
  port: 75