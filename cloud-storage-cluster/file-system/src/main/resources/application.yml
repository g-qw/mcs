server:
  port: 8101

spring:
  profiles:
    default: dev

# 日志配置
logging:
  level:
    root: INFO
    org.cloud.fs.service: DEBUG

    # 关闭远程方法调用日志
    sun.rmi: OFF
    javax.management.remote.rmi: OFF

    # 数据库日志：连接泄漏、慢 SQL、超时
    com.zaxxer.hikari: WARN
    com.zaxxer.hikari.HikariConfig: INFO
    org.springframework.jdbc: DEBUG
    org.springframework.jdbc.datasource.DataSourceUtils: INFO