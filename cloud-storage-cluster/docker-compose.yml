services:
  postgres:
    image: postgres:15.17
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
      - ./init/pgsql_db_init.sql:/docker-entrypoint-initdb.d/pgsql_db_init.sql
    ports:
      - "5432:5432"
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4.8
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "6379:6379"
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nacos:
    image: nacos/nacos-server:v2.5.1
    container_name: nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: derby
      JVM_XMS: 1g
      JVM_XMX: 1g
      JVM_XMN: 512m
      TZ: Asia/Shanghai
    volumes:
      - nacos_logs:/home/nacos/logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8848/nacos/v1/console/health/readiness >/dev/null && curl -sf http://localhost:8848/nacos/v1/console/health/liveness >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  minio:
    image: minio/minio:RELEASE.2025-01-18T00-31-37Z
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - minio_data:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "9000:9000"   # S3 API 端口
      - "9001:9001"   # Web 控制台端口
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: gateway
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      TZ: Asia/Shanghai
      JAVA_OPTS: >-
        -XX:MaxRAMPercentage=60.0
        -XX:MaxMetaspaceSize=64m
        -Xss256k

    ports:
      - "75:75"
    volumes:
      - gateway_logs:/app/logs
      - ./gateway/src/main/resources/application-prod.yml:/app/application-prod.yml:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - backend-network
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1GB
        reservations:
          memory: 512M

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      TZ: Asia/Shanghai
      JAVA_OPTS: >-
        -XX:MaxRAMPercentage=75.0
        -XX:MaxMetaspaceSize=128m
        -Xss512k
    ports:
      - "8100:8100"
    volumes:
      - user_logs:/app/logs
      - ./user-service/src/main/resources/application-prod.yml:/app/application-prod.yml:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - backend-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1GB
        reservations:
          memory: 512M

  file-system:
    build:
      context: .
      dockerfile: file-system/Dockerfile
    container_name: file-system
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TZ: Asia/Shanghai
      JAVA_OPTS: >-
        -XX:MaxRAMPercentage=75.0
        -XX:MaxMetaspaceSize=128m
        -Xss512k
    ports:
      - "8101:8101"
    volumes:
      - fs_logs:/app/logs
      - ./file-system/src/main/resources/application-prod.yml:/app/application-prod.yml:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - backend-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1GB
        reservations:
          memory: 512M

  storage-service:
    build:
      context: .
      dockerfile: storage-service/Dockerfile
    container_name: storage-service
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      TZ: Asia/Shanghai
      JAVA_OPTS: >-
        -XX:MaxRAMPercentage=25.0
        -XX:MaxDirectMemorySize=2g
        -Dreactor.netty.ioWorkerCount=16
    ports:
      - "8102:8102"
    volumes:
      - storage_logs:/app/logs
      - ./storage-service/src/main/resources/application-prod.yml:/app/application-prod.yml:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - backend-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4GB
        reservations:
          memory: 1GB

# 数据卷定义
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nacos_logs:
    driver: local
  minio_data:
    driver: local
  gateway_logs:
    driver: local
  user_logs:
    driver: local
  fs_logs:
    driver: local
  storage_logs:
    driver: local

# 网络配置
networks:
  backend-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16