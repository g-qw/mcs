server:
  port: 8100

spring:
  profiles:
    active: dev
  application:
    name: user-service

jimmer:
  dialect: org.babyfish.jimmer.sql.dialect.PostgresDialect
  show-sql: true
  pretty-sql: true
  client:
    ts:
      path: /ts.zip
    openapi:
      path: /openapi.json
      ui-path: /openapi.html
      properties:
        info:
          title: 用户服务
          description: 用户注册、登录，身份验证等等
          version: 1.0

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    display-request-duration: true

logging:
  level:
    root: INFO
    org.cloud.user.service: DEBUG

    # 关闭远程方法调用日志
    sun.rmi: OFF
    javax.management.remote.rmi: OFF

    # 数据库日志：连接泄漏、慢 SQL、超时
    com.zaxxer.hikari: WARN
    com.zaxxer.hikari.HikariConfig: INFO
    org.springframework.jdbc: DEBUG
    org.springframework.jdbc.datasource.DataSourceUtils: INFO
